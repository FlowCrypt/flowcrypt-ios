version: v1.0
name: FlowCrypt iOS App
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode16
execution_time_limit:
  minutes: 30
auto_cancel:
  running:
    when: branch != 'master'
fail_fast:
  stop:
    when: "true"
blocks:
  - name: Build + Swift Unit Test
    dependencies: []
    run:
      when: "change_in('/', {exclude: ['/Core/package.json', '/Core/package-lock.json']})"
    execution_time_limit:
      minutes: 30
    task:
      env_vars:
        - name: LANG
          value: en_US.UTF-8
        - name: SEMAPHORE_GIT_DIR
          value: /Users/semaphore/git/flowcrypt-ios
      prologue:
        commands:
          - checkout && cd ~/git/flowcrypt-ios/
      jobs:
        - name: Build Xcode Project + Swift Unit Test
          commands:
            - cd /Applications
            - ls
            - ps aux | grep Simulator
            - sudo tccutil reset All com.apple.dt.Xcode
            - open -Fn /Applications/Xcode-16.0.app/Contents/Developer/Applications/Simulator.app
            - fastlane build
            - cd /var/tmp/derived_data/FlowCrypt/Build/Products/Debug-iphonesimulator && cache store FlowCrypt-$SEMAPHORE_GIT_SHA.app FlowCrypt.app
            # - fastlane test
        - name: Build WebDriverAgent
          commands:
            - git clone https://github.com/appium/WebDriverAgent.git
            - cd WebDriverAgent
            - xcodebuild build-for-testing -project WebDriverAgent.xcodeproj -derivedDataPath /var/tmp/derived_data/WebDriverAgent -scheme WebDriverAgentRunner -destination "platform=iOS Simulator,name=iPhone SE (3rd generation)" CODE_SIGNING_ALLOWED=NO
            - cd /var/tmp/derived_data/WebDriverAgent/Build/Products/Debug-iphonesimulator && cache store WebDriverAgentRunner-Runner-$SEMAPHORE_GIT_SHA.app WebDriverAgentRunner-Runner.app
      # epilogue:
      #   always:
      #     commands:
      #       - cd /var/tmp/derived_data/FlowCrypt/Build/Products/Debug-iphonesimulator && cache store FlowCrypt-$SEMAPHORE_GIT_SHA.app FlowCrypt.app
      #       - cd /var/tmp/derived_data/WebDriverAgent/Build/Products/Debug-iphonesimulator && cache store WebDriverAgentRunner-Runner-$SEMAPHORE_GIT_SHA.app WebDriverAgentRunner-Runner.app
  
      
      # caches:
      #   - paths:
      #       - /var/tmp/derived_data/WebDriverAgent
  # - name: TypeScript tests
  #   dependencies: []
  #   run:
  #     when: "change_in('/', {exclude: ['/appium/package.json', '/appium/package-lock.json']})"
  #   execution_time_limit:
  #     minutes: 45
  #   task:
  #     agent:
  #       machine:
  #         type: e1-standard-2
  #         os_image: ubuntu2004
  #     env_vars:
  #       - name: LANG
  #         value: en_US.UTF-8
  #       - name: SEMAPHORE_GIT_DIR
  #         value: /home/semaphore/git/flowcrypt-ios
  #     prologue:
  #       commands:
  #         - checkout && cd ~/git/flowcrypt-ios/
  #         - ( cache restore common-npm && npm install && cache store common-npm node_modules )
  #         - ( cd Core && cache restore core-npm && npm install && cache store core-npm node_modules )
  #         - ( cd appium && cache restore appium-npm && npm install && cache store appium-npm node_modules )
  #     jobs:
  #       - name: TypeScript tests + code quality
  #         commands:
  #           - cd Core
  #           - npm test
  #           - npm run eslint
  #           - cd ../appium
  #           - npm run lint
  - name: UI Tests
    dependencies:
      - Build + Swift Unit Test
    task:
      env_vars:
        - name: LANG
          value: en_US.UTF-8
        - name: SEMAPHORE_GIT_DIR
          value: /Users/semaphore/git/flowcrypt-ios
      prologue:
        commands:
          - checkout && cd ~/git/flowcrypt-ios/
          - mv ~/appium-env ~/git/flowcrypt-ios/appium/.env
          - cache restore appium-npm && cd ./appium && npm i && cd .. && cache store appium-npm appium/node_modules
          - cd appium
          - cache restore FlowCrypt-$SEMAPHORE_GIT_SHA.app
          - cache restore WebDriverAgentRunner-Runner-$SEMAPHORE_GIT_SHA.app
      epilogue:
        always:
          commands:
            - artifact push job ~/git/flowcrypt-ios/appium/tmp
            - test-results publish ~/git/flowcrypt-ios/appium/tmp/test-results
      jobs:
        - name: Run Mock inbox + compose tests
          commands:
            - ps aux | grep Simulator
            - sudo tccutil reset All com.apple.dt.Xcode
            - npm run-script test.mock.inbox
            # - npm run-script test.mock.compose
        # - name: Run Mock setup + live + other test
        #   commands:
        #     - npm run-script test.mock.setup
        #     - npm run-script test.mock.login-settings
        #     # temporary disabled because of e2e account login issue
        #     # - 'wget https://flowcrypt.s3.eu-central-1.amazonaws.com/release/flowcrypt-ios-old-version-for-ci-storage-compatibility-2022-05-09.zip -P ~/git/flowcrypt-ios/appium'
        #     # - unzip flowcrypt-ios-*.zip
        #     # - npm run-script test.live.all
      secrets:
        - name: flowcrypt-ios-ci-secrets
    run:
      when: "change_in('/', {exclude: ['/Core/package.json', '/Core/package-lock.json']})"
after_pipeline:
  task:
    jobs:
      - name: Publish Results
        commands:
          - test-results gen-pipeline-report
