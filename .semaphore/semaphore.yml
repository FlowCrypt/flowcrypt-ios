version: v1.0
name: FlowCrypt iOS App
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode16
execution_time_limit:
  minutes: 30
auto_cancel:
  running:
    when: branch != 'master'
fail_fast:
  stop:
    when: "true"
blocks:
  - name: Build + Swift Unit Test
    dependencies: []
    run:
      when: "change_in('/', {exclude: ['/Core/package.json', '/Core/package-lock.json']})"
    execution_time_limit:
      minutes: 30
    task:
      env_vars:
        - name: LANG
          value: en_US.UTF-8
        - name: SEMAPHORE_GIT_DIR
          value: /Users/semaphore/git/flowcrypt-ios
      jobs:
        - name: Build Xcode Project + Swift Unit Test
          commands:
            - sudo open /Applications/Xcode-16.0.0.app/

after_pipeline:
  task:
    jobs:
      - name: Publish Results
        commands:
          - test-results gen-pipeline-report
